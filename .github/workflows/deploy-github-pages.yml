# coding-and-architecture-requirements-managed-file: .github/workflows/deploy-github-pages.yml
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "15 15 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out default branch
        uses: actions/checkout@v5

      - name: Compute public base path
        id: base-path
        shell: bash
        env:
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"

          if [[ -n "$PAGES_BASE_PATH" ]]; then
            echo "public_base_path=$PAGES_BASE_PATH" >> "$GITHUB_OUTPUT"
          elif [[ "$repo_name" == *.github.io ]]; then
            echo "public_base_path=/" >> "$GITHUB_OUTPUT"
          else
            echo "public_base_path=/$repo_name/" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          PUBLIC_BASE_PATH: ${{ steps.base-path.outputs.public_base_path }}
        run: bun run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
